site_name: CG4j
site_url: https://cg4j.net

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Call Graphs Basics: callgraph-basics.md

theme:
  name: material
  language: en
  logo: assets/cg4j-logo.svg
  favicon: assets/cg4j-logo.svg
  palette:
    scheme: slate
  features:
    - navigation.tabs
    - navigation.tabs.sticky

copyright: Copyright &copy; 2026

extra_css:
  - css/extra.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

plugins:
  - kroki:
      server_url: https://kroki.io
      fence_prefix: kroki-
