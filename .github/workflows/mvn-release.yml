name: Publish to Maven Central

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: refs/tags/${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Resolve release version
        id: release_version
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          RELEASE_VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches pom version
        shell: bash
        run: |
          TAG="${{ steps.release_version.outputs.tag }}"
          RELEASE_VERSION="${{ steps.release_version.outputs.release_version }}"
          POM_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "Tag version: $TAG"
          echo "Normalized tag version: $RELEASE_VERSION"
          echo "POM version: $POM_VERSION"
          test "$RELEASE_VERSION" = "${POM_VERSION%-SNAPSHOT}"

      - name: Set version
        shell: bash
        run: mvn versions:set -DnewVersion="${{ steps.release_version.outputs.release_version }}" -DgenerateBackupPoms=false

      - name: Publish to Maven Central
        run: mvn -B -Prelease clean deploy
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
