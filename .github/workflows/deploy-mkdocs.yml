name: Deploy MkDocs to the CG4j Website

on:
  push:
    branches: [ master ]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/deploy-mkdocs.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material mkdocs-kroki-plugin

      - name: Build site
        run: mkdocs build --clean

      - name: Deploy to the CG4j website repo (gh-pages)
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PUBLISH_TOKEN }}
          external_repository: cg4j/cg4j.github.io
          publish_branch: main
          publish_dir: ./site
          force_orphan: true
          commit_message: "Deploy MkDocs: ${{ github.sha }}"
