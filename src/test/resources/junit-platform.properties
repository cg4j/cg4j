# JUnit 5 Parallel Execution Configuration

# Enable parallel execution
junit.jupiter.execution.parallel.enabled=true

# Run test methods in parallel (same class)
junit.jupiter.execution.parallel.mode.default=concurrent

# Run test classes in parallel
junit.jupiter.execution.parallel.mode.classes.default=concurrent

# Parallel execution strategy
# Options: dynamic, fixed, custom
# - dynamic: Uses available processors (Runtime.getRuntime().availableProcessors())
# - fixed: Uses explicit parallelism count
junit.jupiter.execution.parallel.config.strategy=dynamic

# Dynamic strategy configuration
# Factor to multiply by number of available processors
# Default is 1.0, we use 1.0 for conservative parallelism
junit.jupiter.execution.parallel.config.dynamic.factor=1.0

# Alternative fixed strategy (commented out)
# Uncomment to use fixed thread count instead of dynamic
# junit.jupiter.execution.parallel.config.strategy=fixed
# junit.jupiter.execution.parallel.config.fixed.parallelism=4

# Execution timeout (optional - prevents hanging tests)
# junit.jupiter.execution.timeout.default=5m
